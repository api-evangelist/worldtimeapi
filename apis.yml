aid: worldtimeapi
name: World Time API
description: >-
  World Time API (timeapi.world) is a free REST API that provides current time,
  timezone information, UTC offset, DST status, and Unix epoch time for any
  timezone or IP address. Originally hosted at worldtimeapi.org (now sunset),
  the service continues as a source-available, drop-in compatible successor
  built on Cloudflare Workers with p99 latency under 40ms. It supports 537
  IANA timezones, IP-to-timezone conversion, and IP geolocation. The API
  returns JSON or plain-text responses and requires no authentication on the
  free tier.
